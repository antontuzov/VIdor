# Coturn TURN/STUN Server Configuration
# For Vidor video conferencing

# Listening ports
listening-port=3478
tls-listening-port=5349

# Listener IP
listener-ip=0.0.0.0

# Realm (must match your domain in production)
realm=vidor

# Server name
server-name=vidor-turn

# Authentication
lt-cred-mech
user=vidor:turn_password

# Use long-term credentials
use-auth-secret
static-auth-secret=your_super_secret_turn_key

# TLS certificates (for production)
# cert=/etc/turnserver.d/turnserver.crt
# pkey=/etc/turnserver.d/turnserver.key

# Minimum and maximum relay ports
min-port=10000
max-port=10200

# Verbose logging (disable in production)
verbose

# Fingerprint
fingerprint

# No loopback peer
no-loopback-peer

# No multicast peer
no-multicast-peers

# WebRTC compatibility
webRTC

# Log file
log-file=/var/log/turnserver.log

# Simple log format
simple-log

# No TCP relay (UDP only for WebRTC)
no-tcp-relay

# No CLI (command line interface)
no-cli

# No TLS (enable in production with proper certs)
# no-tls

# No DTLS (enable in production)
# no-dtls

# Stun only mode (disable for TURN functionality)
# stun-only

# Deney peering on private IPs (security)
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=127.0.0.0-127.255.255.255

# Allowed peer IPs (optional, for production)
# allowed-peer-ip=192.168.0.0-192.168.255.255
# allowed-peer-ip=10.0.0.0-10.255.255.255

# Rate limiting
max-bps=1000000

# User quota
user-quota=12

# Total quota
total-quota=1200

# Time to live
no-tcp
no-multicast-peers

# Redis (optional, for clustered setup)
# redis
# redis-serverdb=0
# redis-password=redis_password
# redis-username=vidor

# PostgreSQL (optional, for user management)
# pgsql
# pgsql-userdb=vidor
# pgsql-password=postgres_password
